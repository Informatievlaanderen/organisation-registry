name: setup-dotnet
description: Setup .NET Core

inputs:
  version:
    description: 'Optional dotnet version. Falls back to global.json when omitted.'
    required: false

runs:
  using: 'composite'
  steps:

  - name: Setup .NET Core from input
    if: inputs.version != ''
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ inputs.version }}

  - name: Setup .NET Core from global.json
    if: inputs.version == ''
    uses: actions/setup-dotnet@v4
    with:
      global-json-file: global.json

  - name: .NET version
    shell: bash
    run: dotnet --info

  - name: Restore dotnet tools
    shell: bash
    run: dotnet tool restore

  - name: Dotnet restore
    shell: bash
    run: dotnet restore
