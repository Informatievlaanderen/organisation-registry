apiVersion: batch/v1
kind: Job
metadata:
  name: piavo-import
  namespace: wegwijs-demo
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-api
        image: busybox
        command: ['sh', '-c', 'until nc -z api 80; do echo waiting for api; sleep 5; done']
      containers:
      - name: piavo-import
        image: k3d-wegwijs-registry:5051/wegwijs-piavo-import:local
        env:
        - name: API_BASE
          value: "http://api"
        - name: DEVELOPER_VO_ID
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: developer-vo-id
        - name: JWT_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: jwt-signing-key
        - name: JWT_ISSUER
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: jwt-issuer
        - name: JWT_AUDIENCE
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: jwt-audience