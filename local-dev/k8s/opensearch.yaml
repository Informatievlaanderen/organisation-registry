apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: wegwijs-demo
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:1.1.0
        env:
        - name: discovery.type
          value: "single-node"
        - name: DISABLE_SECURITY_PLUGIN
          value: "true"
        - name: cluster.routing.allocation.disk.watermark.low
          value: "97%"
        - name: cluster.routing.allocation.disk.watermark.high
          value: "98%"
        - name: cluster.routing.allocation.disk.watermark.flood_stage
          value: "99%"
        ports:
        - name: http
          containerPort: 9200
        - name: metrics
          containerPort: 9600
        readinessProbe:
          httpGet:
            path: /
            port: 9200
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        volumeMounts:
        - name: opensearch-data
          mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
  - metadata:
      name: opensearch-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: wegwijs-demo
spec:
  selector:
    app: opensearch
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: metrics
    port: 9600
    targetPort: 9600
