apiVersion: apps/v1
kind: Deployment
metadata:
  name: m2m-demo
  namespace: wegwijs-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m2m-demo
  template:
    metadata:
      labels:
        app: m2m-demo
    spec:
      containers:
      - name: m2m-demo
        image: k3d-wegwijs-registry:5051/wegwijs-m2m:local
        env:
        - name: KEYCLOAK_TOKEN_ENDPOINT
          value: "http://keycloak/realms/wegwijs/protocol/openid-connect/token"
        - name: CJM_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: cjm-client-id
        - name: CJM_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: cjm-client-secret
        - name: ORAFIN_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: orafin-client-id
        - name: ORAFIN_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: orafin-client-secret
        - name: API_BASE_URL
          value: "http://api/v1"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: m2m-demo
  namespace: wegwijs-demo
spec:
  selector:
    app: m2m-demo
  ports:
  - port: 80
    targetPort: 8080
