# Traefik IngressRoutes for all demo services
# Matches both:
#   *.localhost:9080          (local dev)
#   *.10.20.20.100.nip.io:9080  (any IP via nip.io)
#
# keycloak.* → Keycloak
# api.*       → API
# ui.*        → Angular UI (backoffice)
# app.*       → Nuxt BFF (Keycloak demo)
# seq.*        → Seq (structured log viewer)
# m2m.*        → M2M demo
# opensearch.* → OpenSearch
# mock.*       → WireMock
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: wegwijs-demo
spec:
  entryPoints:
    - web
  routes:
  - match: HostRegexp(`^keycloak\..+$`)
    kind: Rule
    services:
    - name: keycloak
      port: 80
