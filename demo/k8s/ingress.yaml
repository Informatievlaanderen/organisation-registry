# Traefik IngressRoutes for all demo services
# Using subdomains on localhost:9080
#
# keycloak.localhost:9080  → Keycloak
# api.localhost:9080       → API
# ui.localhost:9080        → Angular UI (backoffice)
# app.localhost:9080       → Nuxt BFF (Keycloak demo)
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: wegwijs-demo
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`keycloak.localhost`)
    kind: Rule
    services:
    - name: keycloak
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api
  namespace: wegwijs-demo
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`api.localhost`)
    kind: Rule
    services:
    - name: api
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ui
  namespace: wegwijs-demo
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`ui.localhost`)
    kind: Rule
    services:
    - name: ui
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: app
  namespace: wegwijs-demo
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`app.localhost`)
    kind: Rule
    services:
    - name: nuxt-bff
      port: 80
