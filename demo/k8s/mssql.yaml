apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mssql
  namespace: wegwijs-demo
spec:
  serviceName: mssql
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2017-latest
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: demo-secrets
              key: mssql-sa-password
        - name: MSSQL_TCP_PORT
          value: "1433"
        - name: MSSQL_IP_ADDRESS
          value: "0.0.0.0"
        ports:
        - containerPort: 1433
        readinessProbe:
          exec:
            command:
            - /opt/mssql-tools/bin/sqlcmd
            - -S
            - localhost
            - -U
            - sa
            - -P
            - "E@syP@ssw0rd"
            - -Q
            - "SELECT 1"
            - -b
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        volumeMounts:
        - name: mssql-data
          mountPath: /var/opt/mssql
  volumeClaimTemplates:
  - metadata:
      name: mssql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mssql
  namespace: wegwijs-demo
spec:
  selector:
    app: mssql
  ports:
  - port: 1433
    targetPort: 1433
