service:
  type: LoadBalancer

ports:
  web:
    port: 80
    exposedPort: 80
  websecure:
    port: 443
    exposedPort: 443

api:
  dashboard: true
  insecure: true

ingressRoute:
  dashboard:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

logs:
  general:
    level: ERROR
  access:
    enabled: false
